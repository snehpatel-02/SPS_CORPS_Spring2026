<!DOCTYPE html>
<html>
<head>
    <title>AI Use Case Triage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .AI_Solution_Design {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .Data_Technical_Readiness {
            background-color: #fff3e0;
            color: #ef6c00;
        }

        .Governance_Risk_Operational {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🤖 AI Use Case Triage</h2>

    <form method="POST">
        <textarea name="use_case" rows="4" placeholder="Enter your AI use case..."></textarea>
        <button type="submit">Classify</button>
    </form>

    {% if prediction %}
        <div class="result {{ prediction }}">
            Prediction: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
